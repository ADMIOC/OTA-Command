name: "Phase 7 — Production"

on:
  repository_dispatch:
    types: [phase_07_production]

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Run Production
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          DESCRIPT_API_KEY: ${{ secrets.DESCRIPT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python -c "
          from phases.07_production.producer import run_production
          import json
          payload = json.loads('${{ toJSON(github.event.client_payload) }}')
          run_production(payload['video_id'], payload['slug'], payload)
          "
