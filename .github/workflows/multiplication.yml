name: "Phase 6 — Content Multiplication"

on:
  repository_dispatch:
    types: [phase_06_multiplication]

jobs:
  multiply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run Multiplication
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python -c "
          from phases.06_multiplication.multiplier import run_multiplication
          import json
          payload = json.loads('${{ toJSON(github.event.client_payload) }}')
          run_multiplication(payload['video_id'], payload['slug'], payload)
          "
