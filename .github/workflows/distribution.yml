name: "Phase 9 — Distribution"

on:
  repository_dispatch:
    types: [phase_09_distribution]

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run Distribution
        env:
          RESTREAM_API_KEY: ${{ secrets.RESTREAM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python -c "
          from phases.09_distribution.distributor import run_distribution
          import json
          payload = json.loads('${{ toJSON(github.event.client_payload) }}')
          run_distribution(payload['video_id'], payload['slug'], payload)
          "
